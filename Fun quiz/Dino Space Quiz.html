<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050a1a;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --yellow: oklch(85% 0.18 88);
    --pink:   oklch(72% 0.22 340);
    --cyan:   oklch(80% 0.16 200);
    --green:  oklch(78% 0.18 145);
    --purple: oklch(68% 0.20 290);
    --text:   #f0eeff;
    --muted:  rgba(240,238,255,0.55);
  }
  html, body { width: 100%; min-height: 100%; }
  body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); overflow-x: hidden; }

  #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s); }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
    50%       { opacity: 1; transform: scale(1.4); }
  }
  .milky-way {
    position: absolute; width: 160%; height: 260px; top: 30%; left: -30%;
    background: radial-gradient(ellipse at center, rgba(140,100,255,0.07) 0%, rgba(100,180,255,0.05) 40%, transparent 70%);
    transform: rotate(-18deg); filter: blur(30px);
  }

  #app { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

  .screen { width: 100%; max-width: 720px; animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

  /* INTRO */
  .intro-wrap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .intro-mascots { font-size: 100px; line-height: 1; display: flex; gap: 16px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
  .intro-title {
    font-family: 'Fredoka One', cursive; font-size: clamp(40px, 8vw, 72px); line-height: 1.05;
    background: linear-gradient(135deg, var(--yellow) 0%, var(--pink) 50%, var(--cyan) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,180,100,0.25));
  }
  .intro-sub { font-size: 22px; font-weight: 700; color: var(--muted); }
  .intro-facts { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  .fact-pill {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 999px;
    padding: 8px 18px; font-size: 15px; font-weight: 700; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-start {
    margin-top: 8px; padding: 20px 56px; border-radius: 999px; border: none; cursor: pointer;
    font-family: 'Fredoka One', cursive; font-size: 28px;
    background: linear-gradient(135deg, var(--yellow), var(--pink)); color: #1a0a00;
    box-shadow: 0 0 40px rgba(255,200,80,0.35), 0 4px 24px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:hover { transform: scale(1.06); box-shadow: 0 0 60px rgba(255,200,80,0.5), 0 8px 32px rgba(0,0,0,0.5); }
  .btn-start:active { transform: scale(0.97); }

  /* QUIZ HEADER */
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .q-counter { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--muted); }
  .q-counter span { color: var(--text); font-size: 24px; }
  .progress-bar-track { flex: 1; height: 10px; background: rgba(255,255,255,0.1); border-radius: 999px; margin: 0 16px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.5s cubic-bezier(.22,1,.36,1); box-shadow: 0 0 10px var(--cyan); }
  .score-badge { background: var(--surface); border: 1.5px solid var(--border); border-radius: 999px; padding: 6px 16px; font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--yellow); white-space: nowrap; }

  /* QUESTION CARD */
  .q-card {
    background: rgba(255,255,255,0.04); border: 1.5px solid var(--border); border-radius: 28px;
    padding: 32px 28px 28px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;
  }
  .q-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(140,100,255,0.08) 0%, transparent 65%);
    pointer-events: none;
  }
  .q-emoji {
    font-size: 72px; line-height: 1; margin-bottom: 16px; display: block;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
    animation: pop 0.4s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .q-text { font-family: 'Fredoka One', cursive; font-size: clamp(22px, 4.5vw, 32px); line-height: 1.25; color: var(--text); }
  .cat-badge {
    display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 14px;
    font-size: 13px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px;
  }
  .cat-badge.dino { background: rgba(255,200,60,0.18); color: var(--yellow); border: 1px solid rgba(255,200,60,0.3); }
  .cat-badge.space { background: rgba(100,180,255,0.15); color: var(--cyan); border: 1px solid rgba(100,180,255,0.3); }

  /* ANSWER GRID */
  .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .answer-btn {
    background: var(--surface); border: 2px solid var(--border); border-radius: 22px;
    padding: 20px 16px; cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
    position: relative; overflow: hidden; text-align: left;
  }
  .answer-btn:not([disabled]):hover {
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.10);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .answer-btn:not([disabled]):active { transform: scale(0.97); }
  .answer-btn[disabled] { cursor: default; }

  .answer-btn.correct {
    border-color: var(--green) !important;
    background: rgba(100,220,120,0.15) !important;
    box-shadow: 0 0 30px rgba(100,220,120,0.25) !important;
    animation: correctPop 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .answer-btn.wrong {
    border-color: var(--pink) !important;
    background: rgba(255,80,140,0.12) !important;
    animation: shake 0.4s ease;
  }
  .answer-btn.dim { opacity: 0.3; }

  @keyframes correctPop { from { transform: scale(0.95); } to { transform: scale(1); } }
  @keyframes shake {
    0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); }
  }

  .answer-letter {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 20px;
    background: rgba(255,255,255,0.1); color: var(--text);
    transition: background 0.2s;
  }
  .answer-btn.correct .answer-letter { background: rgba(100,220,120,0.4); }
  .answer-btn.wrong   .answer-letter { background: rgba(255,80,140,0.35); }

  .answer-label { font-family: 'Fredoka One', cursive; font-size: 19px; color: var(--text); line-height: 1.25; }

  .result-toast {
    text-align: center; margin-top: 16px; font-family: 'Fredoka One', cursive;
    font-size: clamp(16px,3vw,22px); min-height: 36px; animation: fadeUp 0.3s ease both;
    line-height: 1.4; padding: 0 8px;
  }
  .result-toast.correct { color: var(--green); }
  .result-toast.wrong   { color: var(--pink); }

  .btn-next {
    display: block; width: 100%; margin-top: 16px; padding: 16px; border-radius: 999px;
    border: none; cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 22px;
    background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #fff;
    box-shadow: 0 0 30px rgba(100,200,255,0.2), 0 4px 16px rgba(0,0,0,0.4);
    transition: transform 0.15s, opacity 0.3s, box-shadow 0.15s;
    opacity: 0; pointer-events: none;
  }
  .btn-next.visible { opacity: 1; pointer-events: all; animation: fadeUp 0.4s 0.2s cubic-bezier(.22,1,.36,1) both; }
  .btn-next:hover { transform: scale(1.03); box-shadow: 0 0 50px rgba(100,200,255,0.35), 0 8px 24px rgba(0,0,0,0.5); }
  .btn-next:active { transform: scale(0.97); }

  /* SCORE SCREEN */
  .score-screen { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .score-planet { font-size: 120px; line-height: 1; animation: orbit 6s linear infinite; filter: drop-shadow(0 0 30px rgba(255,200,80,0.4)); }
  @keyframes orbit { 0% { transform: rotate(0deg) translateX(10px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(10px) rotate(-360deg); } }
  .score-title {
    font-family: 'Fredoka One', cursive; font-size: clamp(36px, 7vw, 60px);
    background: linear-gradient(135deg, var(--yellow), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .score-number { font-family: 'Fredoka One', cursive; font-size: clamp(56px, 12vw, 100px); color: var(--text); line-height: 1; }
  .score-number .denom { font-size: 0.5em; color: var(--muted); }
  .score-message { font-size: 22px; font-weight: 800; color: var(--muted); max-width: 420px; line-height: 1.4; }
  .stars-row { display: flex; gap: 12px; justify-content: center; }
  .star-icon { font-size: 52px; filter: grayscale(1) opacity(0.3); transition: filter 0.4s, transform 0.4s; }
  .star-icon.lit { filter: none; animation: starPop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes starPop { from { transform: scale(0.2) rotate(-30deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
  .score-breakdown { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .breakdown-pill { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 12px 20px; font-family: 'Fredoka One', cursive; font-size: 17px; color: var(--muted); }
  .breakdown-pill strong { color: var(--text); }
  .btn-retry {
    padding: 18px 48px; border-radius: 999px; border: none; cursor: pointer;
    font-family: 'Fredoka One', cursive; font-size: 24px;
    background: linear-gradient(135deg, var(--yellow), var(--pink)); color: #1a0a00;
    box-shadow: 0 0 40px rgba(255,200,80,0.3), 0 4px 20px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s; margin-top: 8px;
  }
  .btn-retry:hover { transform: scale(1.06); }
  .btn-retry:active { transform: scale(0.97); }

  .confetti-piece {
    position: fixed; width: 10px; height: 14px; border-radius: 3px; top: -20px;
    animation: fall var(--fall-d, 4s) linear var(--fall-delay, 0s) both;
    pointer-events: none; z-index: 999;
  }
  @keyframes fall {
    0%   { transform: translateX(0) rotate(0deg) translateY(0); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateX(var(--dx, 30px)) rotate(var(--rot, 360deg)) translateY(110vh); opacity: 0; }
  }
</style>
</head>
<body>
<div id="starfield"></div>
<div id="app"></div>

<script>
const sf = document.getElementById('starfield');
sf.innerHTML = '<div class="milky-way"></div>';
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() < 0.7 ? Math.random()*2+1 : Math.random()*3+2;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--delay:${-Math.random()*6}s;--min-op:${0.1+Math.random()*0.3};`;
  sf.appendChild(s);
}
</script>

const LETTERS = ['A','B','C','D'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions() {
  const dinos = shuffle(ALL_QUESTIONS.filter(q => q.category === 'dino'));
  const spaces = shuffle(ALL_QUESTIONS.filter(q => q.category === 'space'));
  return shuffle([...dinos.slice(0,5), ...spaces.slice(0,5)]);
}

function getStars(score, total) {
  const pct = score / total;
  if (pct === 1) return 3;
  if (pct >= 0.6) return 2;
  if (pct >= 0.3) return 1;
  return 0;
}

function getMsg(score) {
  if (score === 10) return { msg: "PERFECT SCORE! You're a legendary Dino Space Champion! 🏆", icon: "🏆" };
  if (score >= 7) return { msg: "Wow, you're a dino-space superstar! 🌟", icon: "⭐" };
  if (score >= 4) return { msg: "Great job, dino astronaut! You're learning so fast! 🚀", icon: "🦕" };
  return { msg: "Keep exploring, little explorer! Try again! 🔭", icon: "🌱" };
}

function Confetti() {
  const pieces = Array.from({length: 60}, (_, i) => ({
    id: i,
    color: ['#FFD060','#FF6EB4','#60E0FF','#A0FF80','#C080FF','#FF8060'][i % 6],
    left: Math.random()*100,
    dx: (Math.random()-0.5)*140,
    rot: Math.random()*720 - 360,
    dur: 2.5 + Math.random()*2.5,
    delay: Math.random()*1.5,
  }));
  return (
    <>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          background: p.color, left: `${p.left}%`,
          '--dx': `${p.dx}px`, '--rot': `${p.rot}deg`,
          '--fall-d': `${p.dur}s`, '--fall-delay': `${p.delay}s`,
        }} />
      ))}
    </>
  );
}

function QuizScreen({ questions, onFinish }) {
  const [qIndex, setQIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [dinoScore, setDinoScore] = useState(0);
  const [spaceScore, setSpaceScore] = useState(0);
  const [animKey, setAnimKey] = useState(0);

  const q = questions[qIndex];
  const answered = selected !== null;
  const isCorrect = selected === q.answer;

  function handleSelect(idx) {
    if (answered) return;
    setSelected(idx);
    if (idx === q.answer) {
      setScore(s => s + 1);
      if (q.category === 'dino') setDinoScore(s => s + 1);
      else setSpaceScore(s => s + 1);
    }
  }

  function handleNext() {
    if (qIndex + 1 >= questions.length) {
      onFinish({ score, dinoScore, spaceScore });
    } else {
      setQIndex(i => i + 1);
      setSelected(null);
      setAnimKey(k => k + 1);
    }
  }

  const pct = (qIndex / questions.length) * 100;

  return (
    <div className="screen" key={animKey}>
      <div className="quiz-header">
        <div className="q-counter"><span>{qIndex+1}</span>/{questions.length}</div>
        <div className="progress-bar-track">
          <div className="progress-bar-fill" style={{width:`${pct}%`}}></div>
        </div>
        <div className="score-badge">⭐ {score}</div>
      </div>

      <div className="q-card">
        <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
          <span className={`cat-badge ${q.category}`}>
            {q.category === 'dino' ? '🦕 Dinosaur' : '🚀 Space'}
          </span>
        </div>
        <span className="q-emoji">{q.emoji}</span>
        <div className="q-text">{q.question}</div>
      </div>

      <div className="answer-grid">
        {q.options.map((opt, i) => {
          let cls = 'answer-btn';
          if (answered) {
            if (i === q.answer) cls += ' correct';
            else if (i === selected) cls += ' wrong';
            else cls += ' dim';
          }
          return (
            <button key={i} className={cls} onClick={() => handleSelect(i)} disabled={answered}>
              <div className="answer-letter">{LETTERS[i]}</div>
              <div className="answer-label">{opt}</div>
            </button>
          );
        })}
      </div>

      {answered && (
        <div className={`result-toast ${isCorrect ? 'correct' : 'wrong'}`}>
          {isCorrect
            ? `✅ Correct! ${q.funFact}`
            : `❌ Oops! The answer was ${q.options[q.answer]}! ${q.funFact}`}
        </div>
      )}

      <button className={`btn-next ${answered ? 'visible' : ''}`} onClick={handleNext}>
        {qIndex + 1 >= questions.length ? 'See My Score! 🎉' : 'Next Question →'}
      </button>
    </div>
  );
}

function ScoreScreen({ score, dinoScore, spaceScore, total, onRetry }) {
  const stars = getStars(score, total);
  const { msg, icon } = getMsg(score);
  const [starsLit, setStarsLit] = useState(0);

  useEffect(() => {
    let i = 0;
    const t = setInterval(() => { i++; setStarsLit(i); if (i >= 3) clearInterval(t); }, 400);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="screen">
      {score >= 7 && <Confetti />}
      <div className="score-screen">
        <div className="score-planet">{icon}</div>
        <div className="score-title">
          {score === total ? 'PERFECT!' : score >= 7 ? 'Awesome!' : score >= 4 ? 'Well done!' : 'Good try!'}
        </div>
        <div className="score-number">{score}<span className="denom">/{total}</span></div>
        <div className="stars-row">
          {[0,1,2].map(i => (
            <span key={i} className={`star-icon ${i < stars && i < starsLit ? 'lit' : ''}`}>⭐</span>
          ))}
        </div>
        <div className="score-message">{msg}</div>
        <div className="score-breakdown">
          <div className="breakdown-pill">🦕 Dino: <strong>{dinoScore}/5</strong></div>
          <div className="breakdown-pill">🚀 Space: <strong>{spaceScore}/5</strong></div>
        </div>
        <button className="btn-retry" onClick={onRetry}>Play Again! 🔄</button>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('intro');
  const [results, setResults] = useState(null);
  const [questions, setQuestions] = useState([]);

  function startQuiz() {
    setQuestions(pickQuestions());
    setScreen('quiz');
  }

  function handleFinish(res) { setResults(res); setScreen('score'); }
  function handleRetry() { setResults(null); setScreen('intro'); }

  return (
    <div>
      {screen === 'intro' && <IntroScreen onStart={startQuiz} />}
      {screen === 'quiz' && <QuizScreen questions={questions} onFinish={handleFinish} />}
      {screen === 'score' && results && (
        <ScoreScreen score={results.score} dinoScore={results.dinoScore} spaceScore={results.spaceScore} total={10} onRetry={handleRetry} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
</body>
</html>
